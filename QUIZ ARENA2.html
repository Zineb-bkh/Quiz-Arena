<!doctype html>
<html lang="fr" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Arena</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&amp;family=Rajdhani:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    
    :root {
      --dark-bg: #212E53;
      --primary: #4A919E;
      --neutral: #BED3C3;
      --hover: #EBACA2;
      --accent: #CE6A6B;
    }
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--dark-bg);
      margin: 0;
      padding: 0;
    }
    
    .font-display {
      font-family: 'Orbitron', sans-serif;
    }
    
    .glow-text {
      text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary), 0 0 60px var(--primary);
    }
    
    .glow-box {
      box-shadow: 0 0 20px rgba(74, 145, 158, 0.5), 0 0 40px rgba(74, 145, 158, 0.3);
    }
    
    .card-shadow {
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(74, 145, 158, 0.5); }
      50% { box-shadow: 0 0 40px rgba(74, 145, 158, 0.8), 0 0 60px rgba(74, 145, 158, 0.4); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    @keyframes bounce-in {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes slide-up {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes slide-in-right {
      from { transform: translateX(50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes score-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    
    @keyframes float-up {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-50px); opacity: 0; }
    }
    
    @keyframes timer-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    
    @keyframes record-celebration {
      0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
      50% { transform: scale(1.1) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .animate-shake { animation: shake 0.5s ease-in-out; }
    .animate-bounce-in { animation: bounce-in 0.6s ease-out forwards; }
    .animate-slide-up { animation: slide-up 0.5s ease-out forwards; }
    .animate-slide-in-right { animation: slide-in-right 0.4s ease-out forwards; }
    .animate-score-pop { animation: score-pop 0.3s ease-out; }
    .animate-float-up { animation: float-up 1s ease-out forwards; }
    .animate-timer-pulse { animation: timer-pulse 1s ease-in-out infinite; }
    .animate-record { animation: record-celebration 0.8s ease-out forwards; }
    
    .btn-primary {
      background: var(--primary);
      transition: all 0.3s ease;
    }
    
    .btn-primary:hover {
      background: var(--hover);
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(235, 172, 162, 0.5);
    }
    
    .btn-primary:active {
      transform: scale(0.95);
    }
    
    .answer-btn {
      background: var(--primary);
      transition: all 0.2s ease;
    }
    
    .answer-btn:hover:not(:disabled) {
      background: var(--hover);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }
    
    .answer-btn:active:not(:disabled) {
      transform: scale(0.98);
    }
    
    .answer-btn.correct {
      background: var(--neutral) !important;
      box-shadow: 0 0 30px rgba(190, 211, 195, 0.8);
    }
    
    .answer-btn.incorrect {
      background: var(--accent) !important;
      box-shadow: 0 0 30px rgba(206, 106, 107, 0.8);
    }
    
    .timer-circle {
      stroke-dasharray: 283;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
    }
    
    .screen {
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .screen.active {
      display: flex;
      opacity: 1;
    }
    
    .question-card {
      background: var(--neutral);
      transition: all 0.3s ease;
    }
    
    .floating-score {
      position: absolute;
      pointer-events: none;
      font-weight: bold;
      color: var(--neutral);
    }
    
    .rank-badge {
      background: linear-gradient(135deg, var(--primary), var(--hover));
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: 600;
    }
    
    .progress-bar {
      height: 6px;
      background: rgba(74, 145, 158, 0.3);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--primary);
      transition: width 0.3s ease, background 0.3s ease;
    }
    
    .progress-fill.urgent {
      background: var(--accent);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <div id="app" class="min-h-full w-full flex flex-col items-center justify-center p-4" style="background: linear-gradient(135deg, #212E53 0%, #1a2544 50%, #212E53 100%);">
   <div id="home-screen" class="screen active flex-col items-center justify-center text-center w-full max-w-lg">
    <div class="animate-float mb-8">
     <div class="relative">
      <h1 id="title-text" class="font-display text-5xl md:text-6xl font-black text-white glow-text tracking-wider">QUIZ ARENA</h1>
      <div class="absolute -inset-4 bg-[#4A919E] opacity-20 blur-2xl rounded-full"></div>
     </div>
    </div>
    <p id="subtitle-text" class="text-xl md:text-2xl mb-12 tracking-wide" style="color: #BED3C3;">Teste ta rapidité. Défie ton propre score.</p>
    <div class="mb-10 animate-pulse-glow rounded-full p-6" style="background: rgba(74, 145, 158, 0.2);">
     <svg class="w-20 h-20" viewbox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="45" stroke="#4A919E" stroke-width="3" fill="none" /> <polygon points="50,20 80,75 20,75" fill="#4A919E" opacity="0.8" /> <circle cx="50" cy="55" r="12" fill="#BED3C3" /> <text x="50" y="60" text-anchor="middle" fill="#212E53" font-size="14" font-weight="bold">
       ?
      </text>
     </svg>
    </div> <button id="start-btn" onclick="startGame()" class="btn-primary text-white font-display font-bold text-xl px-12 py-4 rounded-full mb-8 glow-box"> COMMENCER </button> 
    <div id="home-best-score" class="flex items-center gap-3 text-lg" style="color: #CE6A6B;">
     <svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
     </svg><span class="font-semibold">Meilleur score : <span id="best-score-home">0</span></span>
    </div>
    <div id="rank-display" class="mt-4 rank-badge text-white text-sm">
     🎮 Débutant
    </div>
   </div>
   <div id="game-screen" class="screen flex-col items-center w-full max-w-2xl">
    <div class="w-full flex justify-between items-center mb-6 px-4">
     <div class="flex items-center gap-3">
      <div class="relative w-16 h-16">
       <svg class="w-16 h-16 -rotate-90" viewbox="0 0 100 100"><circle cx="50" cy="50" r="45" stroke="rgba(74, 145, 158, 0.3)" stroke-width="8" fill="none" /> <circle id="timer-circle" cx="50" cy="50" r="45" stroke="#4A919E" stroke-width="8" fill="none" class="timer-circle" />
       </svg>
       <div class="absolute inset-0 flex items-center justify-center"><span id="timer-text" class="font-display font-bold text-xl text-white">15</span>
       </div>
      </div><span class="text-white font-semibold opacity-70">TEMPS</span>
     </div>
     <div class="text-center"><span id="question-counter" class="font-display text-2xl font-bold text-white">1/10</span>
      <div class="progress-bar w-32 mt-2">
       <div id="progress-fill" class="progress-fill" style="width: 10%;"></div>
      </div>
     </div>
     <div class="relative flex items-center gap-3"><span class="text-white font-semibold opacity-70">SCORE</span> <span id="score-display" class="font-display text-3xl font-bold" style="color: #CE6A6B;">0</span>
      <div id="floating-scores" class="absolute -top-2 right-0"></div>
     </div>
    </div>
    <div class="w-full px-4 mb-6">
     <div class="progress-bar w-full h-3 rounded-full">
      <div id="timer-bar" class="progress-fill rounded-full" style="width: 100%;"></div>
     </div>
    </div>
    <div id="question-card" class="question-card w-full rounded-2xl p-8 mb-8 card-shadow">
     <p id="question-text" class="text-xl md:text-2xl font-semibold text-center" style="color: #212E53;">Quelle est la capitale de la France ?</p>
    </div>
    <div id="answers-grid" class="grid grid-cols-2 gap-4 w-full"><button class="answer-btn text-white font-semibold py-5 px-6 rounded-xl text-lg" onclick="checkAnswer(0)">Paris</button> <button class="answer-btn text-white font-semibold py-5 px-6 rounded-xl text-lg" onclick="checkAnswer(1)">Lyon</button> <button class="answer-btn text-white font-semibold py-5 px-6 rounded-xl text-lg" onclick="checkAnswer(2)">Marseille</button> <button class="answer-btn text-white font-semibold py-5 px-6 rounded-xl text-lg" onclick="checkAnswer(3)">Bordeaux</button>
    </div>
   </div>
   <div id="end-screen" class="screen flex-col items-center justify-center text-center w-full max-w-lg">
    <div class="question-card rounded-3xl p-10 card-shadow w-full animate-bounce-in">
     <div id="end-title" class="font-display text-3xl font-bold mb-6" style="color: #212E53;">
      PARTIE TERMINÉE
     </div>
     <div id="new-record-badge" class="hidden mb-6">
      <div class="inline-flex items-center gap-2 px-6 py-3 rounded-full animate-record" style="background: linear-gradient(135deg, #CE6A6B, #EBACA2); box-shadow: 0 0 30px rgba(206, 106, 107, 0.6);">
       <svg class="w-6 h-6 text-white" fill="currentColor" viewbox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
       </svg><span class="text-white font-bold text-lg">NOUVEAU RECORD !</span>
      </div>
     </div>
     <div class="mb-8">
      <div class="text-6xl font-display font-black mb-2" style="color: #CE6A6B;"><span id="final-score">0</span>
      </div>
      <div class="text-lg opacity-70" style="color: #212E53;">
       points
      </div>
     </div>
     <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="p-4 rounded-xl" style="background: rgba(33, 46, 83, 0.1);">
       <div class="font-display text-2xl font-bold" style="color: #4A919E;"><span id="correct-answers">0</span>/10
       </div>
       <div class="text-sm opacity-70" style="color: #212E53;">
        Bonnes réponses
       </div>
      </div>
      <div class="p-4 rounded-xl" style="background: rgba(33, 46, 83, 0.1);">
       <div class="font-display text-2xl font-bold" style="color: #CE6A6B;"><span id="end-best-score">0</span>
       </div>
       <div class="text-sm opacity-70" style="color: #212E53;">
        Meilleur score
       </div>
      </div>
     </div>
     <div id="end-rank" class="rank-badge text-white mb-8">
      🎮 Débutant
     </div>
     <p id="end-message" class="text-lg mb-8" style="color: #212E53;">Continue à t'entraîner !</p>
     <div class="flex flex-col sm:flex-row gap-4 justify-center"><button onclick="startGame()" class="btn-primary text-white font-display font-bold text-lg px-8 py-4 rounded-full"> 🔄 REJOUER </button> <button onclick="goHome()" class="bg-transparent border-2 font-display font-bold text-lg px-8 py-4 rounded-full transition-all hover:bg-opacity-10" style="border-color: #212E53; color: #212E53;"> 🏠 ACCUEIL </button>
     </div>
    </div>
   </div>
  </div>
  <script>
    const questions = [
      { question: "Quelle est la capitale de la France ?", answers: ["Paris", "Lyon", "Marseille", "Bordeaux"], correct: 0 },
      { question: "Combien de continents y a-t-il sur Terre ?", answers: ["5", "6", "7", "8"], correct: 2 },
      { question: "Quel est le plus grand océan du monde ?", answers: ["Atlantique", "Indien", "Pacifique", "Arctique"], correct: 2 },
      { question: "En quelle année a eu lieu la Révolution française ?", answers: ["1789", "1799", "1776", "1815"], correct: 0 },
      { question: "Quel est l'élément chimique le plus abondant dans l'univers ?", answers: ["Oxygène", "Carbone", "Hydrogène", "Hélium"], correct: 2 },
      { question: "Quelle planète est surnommée la 'planète rouge' ?", answers: ["Vénus", "Mars", "Jupiter", "Saturne"], correct: 1 },
      { question: "Combien y a-t-il de joueurs dans une équipe de football ?", answers: ["9", "10", "11", "12"], correct: 2 },
      { question: "Qui a peint la Joconde ?", answers: ["Michel-Ange", "Raphaël", "Léonard de Vinci", "Botticelli"], correct: 2 },
      { question: "Quelle est la monnaie du Japon ?", answers: ["Yuan", "Won", "Yen", "Ringgit"], correct: 2 },
      { question: "Quel est le plus long fleuve du monde ?", answers: ["Amazone", "Nil", "Yangtsé", "Mississippi"], correct: 1 },
      { question: "Combien de faces a un cube ?", answers: ["4", "6", "8", "12"], correct: 1 },
      { question: "Quelle est la vitesse de la lumière ?", answers: ["300 000 km/s", "150 000 km/s", "500 000 km/s", "1 000 000 km/s"], correct: 0 },
      { question: "Quel pays a remporté la Coupe du Monde 2022 ?", answers: ["Brésil", "France", "Argentine", "Allemagne"], correct: 2 },
      { question: "Combien y a-t-il de lettres dans l'alphabet français ?", answers: ["24", "25", "26", "27"], correct: 2 },
      { question: "Quel est le plus petit pays du monde ?", answers: ["Monaco", "Vatican", "Saint-Marin", "Liechtenstein"], correct: 1 },
      { question: "Quelle est la formule chimique de l'eau ?", answers: ["CO2", "H2O", "O2", "NaCl"], correct: 1 },
      { question: "En quelle année l'homme a-t-il marché sur la Lune ?", answers: ["1965", "1969", "1972", "1975"], correct: 1 },
      { question: "Quel est le symbole chimique de l'or ?", answers: ["Ag", "Au", "Fe", "Cu"], correct: 1 },
      { question: "Combien de dents a un adulte ?", answers: ["28", "30", "32", "34"], correct: 2 },
      { question: "Quelle est la capitale de l'Australie ?", answers: ["Sydney", "Melbourne", "Canberra", "Perth"], correct: 2 }
    ];

    let currentQuestion = 0;
    let score = 0;
    let correctCount = 0;
    let timer = 15;
    let timerInterval = null;
    let gameQuestions = [];
    let isAnswering = false;

    const defaultConfig = {
      game_title: "QUIZ ARENA",
      game_subtitle: "Teste ta rapidité. Défie ton propre score.",
      start_button_text: "COMMENCER",
      background_color: "#212E53",
      primary_color: "#4A919E",
      text_color: "#BED3C3",
      accent_color: "#CE6A6B",
      hover_color: "#EBACA2"
    };

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          document.getElementById('title-text').textContent = config.game_title || defaultConfig.game_title;
          document.getElementById('subtitle-text').textContent = config.game_subtitle || defaultConfig.game_subtitle;
          document.getElementById('start-btn').textContent = config.start_button_text || defaultConfig.start_button_text;
          
          const bgColor = config.background_color || defaultConfig.background_color;
          const primaryColor = config.primary_color || defaultConfig.primary_color;
          const textColor = config.text_color || defaultConfig.text_color;
          const accentColor = config.accent_color || defaultConfig.accent_color;
          const hoverColor = config.hover_color || defaultConfig.hover_color;
          
          document.getElementById('app').style.background = `linear-gradient(135deg, ${bgColor} 0%, ${adjustBrightness(bgColor, -10)} 50%, ${bgColor} 100%)`;
          document.documentElement.style.setProperty('--dark-bg', bgColor);
          document.documentElement.style.setProperty('--primary', primaryColor);
          document.documentElement.style.setProperty('--neutral', textColor);
          document.documentElement.style.setProperty('--accent', accentColor);
          document.documentElement.style.setProperty('--hover', hoverColor);
        },
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (value) => window.elementSdk.setConfig({ background_color: value })
            },
            {
              get: () => config.primary_color || defaultConfig.primary_color,
              set: (value) => window.elementSdk.setConfig({ primary_color: value })
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (value) => window.elementSdk.setConfig({ text_color: value })
            },
            {
              get: () => config.accent_color || defaultConfig.accent_color,
              set: (value) => window.elementSdk.setConfig({ accent_color: value })
            },
            {
              get: () => config.hover_color || defaultConfig.hover_color,
              set: (value) => window.elementSdk.setConfig({ hover_color: value })
            }
          ],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["game_title", config.game_title || defaultConfig.game_title],
          ["game_subtitle", config.game_subtitle || defaultConfig.game_subtitle],
          ["start_button_text", config.start_button_text || defaultConfig.start_button_text]
        ])
      });
    }

    function adjustBrightness(hex, percent) {
      const num = parseInt(hex.replace('#', ''), 16);
      const amt = Math.round(2.55 * percent);
      const R = Math.max(0, Math.min(255, (num >> 16) + amt));
      const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
      const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
      return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
    }

    function getBestScore() {
      return parseInt(localStorage.getItem('quizArena_bestScore') || '0');
    }

    function setBestScore(score) {
      localStorage.setItem('quizArena_bestScore', score.toString());
    }

    function getRank(score) {
      if (score >= 80) return { name: "Master", emoji: "👑" };
      if (score >= 60) return { name: "Expert", emoji: "🏆" };
      if (score >= 40) return { name: "Challenger", emoji: "⚔️" };
      return { name: "Débutant", emoji: "🎮" };
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.remove('active');
      });
      setTimeout(() => {
        document.getElementById(screenId).classList.add('active');
      }, 50);
    }

    function initHome() {
      const bestScore = getBestScore();
      document.getElementById('best-score-home').textContent = bestScore;
      const rank = getRank(bestScore);
      document.getElementById('rank-display').textContent = `${rank.emoji} ${rank.name}`;
    }

    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    function startGame() {
      currentQuestion = 0;
      score = 0;
      correctCount = 0;
      gameQuestions = shuffleArray(questions).slice(0, 10);
      
      document.getElementById('score-display').textContent = '0';
      showScreen('game-screen');
      
      setTimeout(() => {
        loadQuestion();
      }, 300);
    }

    function loadQuestion() {
      if (currentQuestion >= gameQuestions.length) {
        endGame();
        return;
      }

      isAnswering = false;
      const q = gameQuestions[currentQuestion];
      
      document.getElementById('question-counter').textContent = `${currentQuestion + 1}/10`;
      document.getElementById('progress-fill').style.width = `${((currentQuestion + 1) / 10) * 100}%`;
  
      const questionCard = document.getElementById('question-card');
      questionCard.style.opacity = '0';
      questionCard.style.transform = 'translateX(50px)';
      
      setTimeout(() => {
        document.getElementById('question-text').textContent = q.question;
        questionCard.style.opacity = '1';
        questionCard.style.transform = 'translateX(0)';
      }, 200);
   
      const buttons = document.querySelectorAll('.answer-btn');
      buttons.forEach((btn, index) => {
        btn.textContent = q.answers[index];
        btn.className = 'answer-btn text-white font-semibold py-5 px-6 rounded-xl text-lg';
        btn.disabled = false;
        btn.style.opacity = '0';
        btn.style.transform = 'translateY(20px)';
        
        setTimeout(() => {
          btn.style.opacity = '1';
          btn.style.transform = 'translateY(0)';
        }, 300 + index * 100);
      });
      
      startTimer();
    }

    function startTimer() {
      timer = 15;
      updateTimerDisplay();
      
      if (timerInterval) clearInterval(timerInterval);
      
      timerInterval = setInterval(() => {
        timer -= 0.1;
        updateTimerDisplay();
        
        if (timer <= 0) {
          clearInterval(timerInterval);
          timeUp();
        }
      }, 100);
    }

    function updateTimerDisplay() {
      const timerText = document.getElementById('timer-text');
      const timerCircle = document.getElementById('timer-circle');
      const timerBar = document.getElementById('timer-bar');
      
      timerText.textContent = Math.ceil(timer);
   
      const progress = (timer / 15) * 283;
      timerCircle.style.strokeDashoffset = 283 - progress;
      
      timerBar.style.width = `${(timer / 15) * 100}%`;
      
      if (timer <= 5) {
        timerCircle.style.stroke = '#CE6A6B';
        timerBar.classList.add('urgent');
        if (timer <= 3) {
          document.getElementById('timer-text').parentElement.classList.add('animate-timer-pulse');
        }
      } else {
        timerCircle.style.stroke = '#4A919E';
        timerBar.classList.remove('urgent');
        document.getElementById('timer-text').parentElement.classList.remove('animate-timer-pulse');
      }
    }

    function timeUp() {
      isAnswering = true;
      const buttons = document.querySelectorAll('.answer-btn');
      const correct = gameQuestions[currentQuestion].correct;
      
      buttons.forEach((btn, index) => {
        btn.disabled = true;
        if (index === correct) {
          btn.classList.add('correct');
        }
      });
      
      setTimeout(() => {
        currentQuestion++;
        loadQuestion();
      }, 1500);
    }

    function checkAnswer(index) {
      if (isAnswering) return;
      isAnswering = true;
      
      clearInterval(timerInterval);
      
      const correct = gameQuestions[currentQuestion].correct;
      const buttons = document.querySelectorAll('.answer-btn');
      
      buttons.forEach(btn => btn.disabled = true);
      
      if (index === correct) {
        buttons[index].classList.add('correct');
        correctCount++;
        
        const timeBonus = Math.floor(timer);
        const points = 10 + timeBonus;
        score += points;
        
        const scoreDisplay = document.getElementById('score-display');
        scoreDisplay.textContent = score;
        scoreDisplay.classList.add('animate-score-pop');
        setTimeout(() => scoreDisplay.classList.remove('animate-score-pop'), 300);
        
        showFloatingScore(`+${points}`);
        
      } else {
        buttons[index].classList.add('incorrect');
        buttons[correct].classList.add('correct');
        
        document.getElementById('question-card').classList.add('animate-shake');
        setTimeout(() => {
          document.getElementById('question-card').classList.remove('animate-shake');
        }, 500);
      }
      
      setTimeout(() => {
        currentQuestion++;
        loadQuestion();
      }, 1500);
    }

    function showFloatingScore(text) {
      const container = document.getElementById('floating-scores');
      const floater = document.createElement('div');
      floater.className = 'floating-score animate-float-up text-xl';
      floater.textContent = text;
      container.appendChild(floater);
      
      setTimeout(() => floater.remove(), 1000);
    }

    function endGame() {
      clearInterval(timerInterval);
      
      const bestScore = getBestScore();
      const isNewRecord = score > bestScore;
      
      if (isNewRecord) {
        setBestScore(score);
      }
      
      document.getElementById('final-score').textContent = score;
      document.getElementById('correct-answers').textContent = correctCount;
      document.getElementById('end-best-score').textContent = isNewRecord ? score : bestScore;
      
      const recordBadge = document.getElementById('new-record-badge');
      if (isNewRecord) {
        recordBadge.classList.remove('hidden');
      } else {
        recordBadge.classList.add('hidden');
      }
      
      const rank = getRank(score);
      document.getElementById('end-rank').textContent = `${rank.emoji} ${rank.name}`;
      
      const messages = {
        high: ["Tu domines l'arène 🔥", "Incroyable performance ! 🏆", "Tu es un vrai champion ! 👑"],
        medium: ["Bien joué ! Continue comme ça 💪", "Pas mal du tout ! 🎯", "Tu progresses ! ⚡"],
        low: ["Continue à t'entraîner ! 📚", "La prochaine sera la bonne ! 🍀", "N'abandonne pas ! 💫"]
      };
      
      let messageArray;
      if (score >= 80) messageArray = messages.high;
      else if (score >= 40) messageArray = messages.medium;
      else messageArray = messages.low;
      
      document.getElementById('end-message').textContent = messageArray[Math.floor(Math.random() * messageArray.length)];
      
      if (isNewRecord) {
        document.getElementById('end-title').innerHTML = '🎉 NOUVEAU RECORD ! 🎉';
      } else {
        document.getElementById('end-title').textContent = 'PARTIE TERMINÉE';
      }
      
      showScreen('end-screen');
    }

    function goHome() {
      initHome();
      showScreen('home-screen');
    }

    initHome();
  </script>
